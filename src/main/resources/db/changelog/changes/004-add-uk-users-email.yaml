databaseChangeLog:
  - changeSet:
      id: 004-add-uk-users-email
      author: Minh
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            - uniqueConstraintExists:
                tableName: users
                constraintName: uk_users_email
      changes:
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uk_users_email
  - changeSet:
      id: 004-2-add-uk-users-email
      author: Minh
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            - uniqueConstraintExists:
                tableName: users
                constraintName: uk_users_phone
      changes:
        - addUniqueConstraint:
            tableName: users
            columnNames: phone
            constraintName: uk_users_phone
  - changeSet:
      id: 004-3-add-uk-users-email
      author: Minh
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            - uniqueConstraintExists:
                tableName: users
                constraintName: uk_users_username
      changes:
        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uk_users_username