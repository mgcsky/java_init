databaseChangeLog:
  - changeSet:
      id: 003-add-constraints-to-user-table
      author: Minh
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
      rollback:
        - dropColumn:
            tableName: users
            columnName: password_hash
        - dropColumn:
            tableName: users
            columnName: status
        - dropColumn:
            tableName: users
            columnName: updated_at